    <!-- Lead Tracker: session, UTM, page_view, page_dwell, waitlist API -->
    <script>
    (function(){
      var API_BASE = 'https://immich-photo-box-waitlist.bytedev2022.workers.dev/api';
      var SITE = 'mochi';
      var VARIANT = 'v1';

      /* Session ID */
      var sid = sessionStorage.getItem('_tk_sid');
      if (!sid) { sid = Date.now().toString(36) + Math.random().toString(36).slice(2, 8); sessionStorage.setItem('_tk_sid', sid); }

      /* UTM Capture */
      var utm = JSON.parse(sessionStorage.getItem('_tk_utm') || '{}');
      if (!sessionStorage.getItem('_tk_utm')) {
        var sp = new URLSearchParams(location.search);
        ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
          var v = sp.get(k); if(v) utm[k] = v;
        });
        if (Object.keys(utm).length) sessionStorage.setItem('_tk_utm', JSON.stringify(utm));
      }

      /* Send Event */
      function sendEvent(evt) {
        evt.site = SITE;
        evt.session_id = sid;
        evt.referrer = document.referrer || '';
        Object.assign(evt, utm);
        var payload = JSON.stringify(evt);
        if (navigator.sendBeacon) {
          navigator.sendBeacon(API_BASE + '/events', new Blob([payload], { type: 'text/plain' }));
        } else {
          fetch(API_BASE + '/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, keepalive: true });
        }
      }

      sendEvent({ event: 'page_view', page: location.pathname });

      /* Dwell */
      var pageEnter = Date.now();
      var pages = JSON.parse(sessionStorage.getItem('_tk_pages') || '[]');
      pages.push({ p: location.pathname, t: pageEnter });
      sessionStorage.setItem('_tk_pages', JSON.stringify(pages));

      var dwellFired = false;
      function fireDwell() {
        if (dwellFired) return;
        dwellFired = true;
        var sec = Math.round((Date.now() - pageEnter) / 1000);
        var pg = JSON.parse(sessionStorage.getItem('_tk_pages') || '[]');
        if (pg.length) { pg[pg.length - 1].d = sec; }
        sessionStorage.setItem('_tk_pages', JSON.stringify(pg));
        sendEvent({ event: 'page_dwell', page: location.pathname, dwell_seconds: sec });
        if (typeof fbq === 'function') fbq('trackCustom', 'PageDwell', { content_name: location.pathname, dwell_seconds: sec });
      }
      document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') fireDwell(); });
      window.addEventListener('beforeunload', fireDwell);

      /* Browsing data helpers */
      function getBrowsingData() {
        var pg = JSON.parse(sessionStorage.getItem('_tk_pages') || '[]');
        if (pg.length) { pg[pg.length - 1].d = Math.round((Date.now() - pg[pg.length - 1].t) / 1000); }
        return pg.map(function(e) { return e.p + ':' + ((e.d || 0)) + 's'; }).join('|').slice(0, 100);
      }
      function getUtmCompact() {
        var u = JSON.parse(sessionStorage.getItem('_tk_utm') || '{}');
        var parts = [];
        if(u.utm_source) parts.push('src:' + u.utm_source);
        if(u.utm_medium) parts.push('med:' + u.utm_medium);
        if(u.utm_campaign) parts.push('cam:' + u.utm_campaign);
        if(u.utm_content) parts.push('con:' + u.utm_content);
        if(u.utm_term) parts.push('trm:' + u.utm_term);
        return parts.join('|').slice(0, 100);
      }

      /* Public submitters used by React form handlers */
      window.__postWaitlist = function(email) {
        return fetch(API_BASE + '/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            site: SITE,
            variant: VARIANT,
            use_case: getUtmCompact(),
            current_solution: getBrowsingData()
          })
        }).then(function(r) { return r.json(); });
      };

      window.__fireLeadPixel = function() {
        if (typeof fbq === 'function') {
          fbq('track', 'Lead', Object.assign({ content_name: SITE + '_reserve', value: 0, currency: 'USD' }, utm));
        }
      };
    })();
    </script>
